<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="./styles.css" />
    <!--
            we use ./ at the beginning of the path
            to indicate that the file is in the same folder
            as the HTML file.
            -->
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Black+Ops+One&family=Creepster&family=La+Belle+Aurore&family=MedievalSharp&family=Orbitron&family=Rye&display=swap"
      rel="stylesheet"
    />
    <!--
            we use the link tag to import fonts from Google Fonts.
            The href attribute contains the URL of the font we want to import.
            The rel attribute is set to "stylesheet" to indicate that we are importing a stylesheet.
            -->
    <script type="module" src="index.js"></script>
    <!--
            we use type="module" to indicate that the JavaScript file is a module.
            This allows us to use import and export statements in our JavaScript code.
            Meaning we're not shoiwing flat text but we can import functions and variables from other JavaScript files.
            -->
  </head>
  <body>
    <!-- 
        Challenge 1:
        Write the HTML for your personal website.
        -->
    <img src="Isr.jpg" alt="A profile picture of Israel" />
    <h1>Hi, my name is Israel 🚀</h1>
    <h2>Fun facts about me:</h2>
    <ul>
      <li>34 years old</li>
      <li>Living in Bogotá, Colombia</li>
      <li>Love to read</li>
    </ul>
    <p>
      Please connect with me on
      <a
        href="https://www.linkedin.com/in/israel-guevara-4490422ba/"
        target="_blank"
        >LinkedIn here</a
      >
    </p>
    <input type="email" placeholder="Enter your email…" />
    <button>Join newsletter</button>
  </body>
</html>
